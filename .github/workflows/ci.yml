name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.target }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.target }}
        run: npm ci
      - name: Lint
        working-directory: ${{ matrix.target }}
        run: npx eslint . --max-warnings 0
      - name: Typecheck
        working-directory: ${{ matrix.target }}
        run: npx tsc --noEmit

  backend-test:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Run backend tests with coverage
        working-directory: backend
        run: npx vitest run --coverage
      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: ignore

  integration:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Build backend
        working-directory: backend
        run: npm run build
      - name: Start backend
        working-directory: backend
        run: |
          export NODE_ENV=test
          export PORT=3001
          export JWT_SECRET=$(printf 'x%.0s' {1..64})
          export ALLOWED_ORIGINS=http://localhost:5173
          export LOG_LEVEL=info
          export KEY_VAULT_TTL_HOURS=24
          node dist/server.js &
      - name: Wait for health check
        run: curl --retry 5 --retry-delay 2 --retry-connrefused http://localhost:3001/api/v1/health
      - name: Run integration tests
        working-directory: backend
        run: npx vitest run tests/integration/

  e2e:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Docker compose up
        run: docker compose up -d --build
      - name: Wait for frontend
        run: curl --retry 10 --retry-delay 3 --retry-connrefused http://localhost
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
      - name: Docker compose down
        if: always()
        run: docker compose down -v

  security:
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Backend dependencies
        working-directory: backend
        run: npm ci
      - name: Frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: npm audit backend
        working-directory: backend
        run: npm audit --audit-level=high
      - name: npm audit frontend
        working-directory: frontend
        run: npm audit --audit-level=high
      - name: Snyk scan backend
        working-directory: backend
        if: ${{ secrets.SNYK_TOKEN != '' }}
        run: npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Snyk scan frontend
        working-directory: frontend
        if: ${{ secrets.SNYK_TOKEN != '' }}
        run: npx snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t cryptovault-backend:ci .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t cryptovault-frontend:ci .
